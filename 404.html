<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 &mdash; Not Found</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪼</text></svg>">
  <style>
    body {
      background: #ffffff;
      color: #000000;
      font-family: "Times New Roman", Times, serif;
      font-size: 14px;
      max-width: 760px;
      margin: 60px auto;
      padding: 0 16px;
      line-height: 1.5;
      text-align: center;
    }

    h1 {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 6px;
      letter-spacing: 2px;
    }

    p {
      margin: 8px 0;
    }

    a {
      color: #000;
      text-decoration: underline;
    }

    a:visited {
      color: #555;
    }

    a:hover {
      background: #000;
      color: #fff;
      text-decoration: none;
    }

    .jelly {
      font-size: 72px;
      margin-bottom: 12px;
    }
  </style>
</head>

<body>
  <div class="jelly">🪼</div>
  <h1>404</h1>
  <p>This page drifted off somewhere.</p>
  <p><a href="/">&larr; Return home</a></p>
</body>

</html>
