<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog &mdash; Junha Yang</title>
  <style>
    body {
      background: #ffffff;
      color: #000000;
      font-family: "Times New Roman", Times, serif;
      font-size: 14px;
      max-width: 720px;
      margin: 20px auto;
      padding: 0 16px;
      line-height: 1.5;
    }

    .post-nav {
      font-family: "Courier New", Courier, monospace;
      font-size: 12px;
      margin-bottom: 20px;
      padding-bottom: 8px;
      border-bottom: 1px dashed #000;
    }

    .post-nav a {
      color: #000;
      text-decoration: underline;
      margin-right: 6px;
    }

    h1 {
      font-size: 26px;
      font-weight: bold;
      border-bottom: 3px double #000;
      padding-bottom: 6px;
      margin-bottom: 20px;
      text-align: center;
      letter-spacing: 0.5px;
    }

    a {
      color: #000;
      text-decoration: underline;
    }

    a:visited {
      color: #555;
    }

    a:hover {
      background: #000;
      color: #fff;
      text-decoration: none;
    }

    .post-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .post-list li {
      padding: 14px 0;
      border-bottom: 1px dashed #999;
    }

    .post-list li:last-child {
      border-bottom: none;
    }

    .post-date {
      font-family: "Courier New", Courier, monospace;
      font-size: 12px;
      color: #555;
      display: inline-block;
      min-width: 100px;
    }

    .post-title {
      font-size: 16px;
      font-weight: bold;
    }

    .post-excerpt {
      font-style: italic;
      color: #333;
      margin-top: 4px;
      margin-left: 100px;
      font-size: 13px;
    }

    .footer {
      border-top: 1px solid #000;
      margin-top: 40px;
      padding-top: 10px;
      text-align: center;
      font-size: 11px;
      font-family: "Courier New", Courier, monospace;
    }

    @media (max-width: 500px) {
      .post-excerpt {
        margin-left: 0;
      }

      .post-date {
        display: block;
        min-width: 0;
        margin-bottom: 2px;
      }
    }
  </style>
</head>

<body>

  <div class="post-nav">
    [ <a href="/">Home</a> | <a href="/casual">Casual</a> ]
  </div>

  <h1>Blog</h1>

  <ul class="post-list">
    <li>
      <span class="post-date">2026-01-28</span>
      <a class="post-title" href="/blog/cto-challenges">A CTO's Challenges</a>
      <div class="post-excerpt">What I learned fumbling through 2 years and 7 months as a CTO.</div>
    </li>
  </ul>

  <div class="footer">
    &copy; 2026 Junha Yang
  </div>

</body>

</html>
